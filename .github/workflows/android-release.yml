name: Android Release APK

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14.3"

      - name: Compute master release version
        run: |
          base_version="$(sed -n 's/.*versionName "\([^"]*\)".*/\1/p' offline-beauty-crm/app/build.gradle | head -n 1)"
          if [ -z "$base_version" ]; then
            echo "::error::Could not read base versionName"
            exit 1
          fi
          version_name="${base_version}-${GITHUB_RUN_NUMBER}"
          version_code=$((1000 + GITHUB_RUN_NUMBER))
          echo "RELEASE_VERSION_NAME=$version_name" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION_CODE=$version_code" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=v$version_name" >> "$GITHUB_ENV"

      - name: Build signed release APK
        working-directory: offline-beauty-crm
        env:
          VERSION_NAME: ${{ env.RELEASE_VERSION_NAME }}
          VERSION_CODE: ${{ env.RELEASE_VERSION_CODE }}
        run: gradle :app:assembleRelease

      - name: Prepare APK asset
        run: |
          mkdir -p release-assets
          cp offline-beauty-crm/app/build/outputs/apk/release/app-release.apk "release-assets/12609-${RELEASE_TAG}.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: 12609 ${{ env.RELEASE_VERSION_NAME }}
          target_commitish: master
          body: |
            Автоматическая сборка из ветки master.

            Commit: ${{ github.sha }}
            Version: ${{ env.RELEASE_VERSION_NAME }}
            Version code: ${{ env.RELEASE_VERSION_CODE }}
          files: release-assets/*.apk
          draft: false
          prerelease: false
          make_latest: true
